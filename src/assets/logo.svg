<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">UnravelDocs logo</title>
  <desc id="desc">Gradient document icon with U monogram and UnravelDocs wordmark.</desc>

  <defs>
    <linearGradient id="ud-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="ud-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <g transform="translate(18,18)">
    <rect x="0" y="0" width="144" height="144" rx="34" fill="url(#ud-bg)"/>
    <path d="M100 18 L126 44 L126 84 Q126 114 106 134 Q86 154 56 154 Q26 154 6 134 Q-14 114 -14 84 V18 Z"
          transform="translate(18,6) scale(0.82)"
          fill="rgba(255,255,255,0.16)"/>
    <path d="M98 20 L122 44 H106 Q98 44 98 36 Z" fill="rgba(255,255,255,0.35)"/>

    <path d="M42 44 V92 Q42 112 58 112 Q74 112 74 92 V44"
          fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M35 122 C52 136, 92 136, 109 122"
          fill="none" stroke="url(#ud-accent)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(192,38)">
    <text x="0" y="64"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="68"
          font-weight="800"
          letter-spacing="-1.2"
          fill="#0f172a">
      Unravel<tspan fill="#4f46e5">Docs</tspan>
    </text>
    <text x="2" y="102"
          font-family="Inter, Segoe UI, Arial, sans-serif"
          font-size="18"
          font-weight="500"
          fill="#475569">
      Unlock your text. Edit anything.
    </text>
  </g>
</svg>
