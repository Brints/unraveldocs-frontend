<div class="logo-container" [class.logo-dark]="theme === 'dark'">
  @if (variant === 'icon') {
    <img
      src="assets/logo.svg"
      alt="UnravelDocs"
      class="logo-image logo-image-icon"
      [style.width.px]="iconSize.width"
      [style.height.px]="iconSize.height"
    />
  }

  @if (variant === 'full' || variant === 'text') {
    <div class="logo-text-container">
      <img
        src="assets/logo.svg"
        alt="UnravelDocs"
        class="logo-image"
        [style.width.px]="fullLogoSize.width"
        [style.height.px]="fullLogoSize.height"
      />
      @if (showTagline) {
        <span class="logo-tagline" [ngClass]="taglineClass">
          {{ tagline }}
        </span>
      }
    </div>
  }
</div>
